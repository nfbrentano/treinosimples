<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Workout Tracker - Atleta</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: {
                  primary: '#A3E635', // Lime Green
                  dark: '#171717',    // Neutral 900
                  surface: '#262626', // Neutral 800
                  accent: '#FACC15'   // Yellow 400
                }
              },
              borderRadius: {
                'xl': '1rem',
                '2xl': '1.5rem'
              }
            }
          }
        }
    </script>
    <style>
        body {
          background-color: #171717;
          color: #FFFFFF;
          -webkit-tap-highlight-color: transparent;
          font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .progress-bar-fill {
          transition: width 0.5s ease-out;
        }
        .custom-checkbox:checked + label .check-icon {
          opacity: 1;
          transform: scale(1);
        }
        .custom-checkbox:checked + label {
          background-color: #A3E635;
          color: #000000;
        }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(23, 23, 23, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }
    </style>
</head>
<body class="min-h-screen pb-32">
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay hidden flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-brand-primary/20 border-t-brand-primary rounded-full animate-spin"></div>
        <p class="mt-4 text-brand-primary font-bold uppercase tracking-widest">Processando...</p>
    </div>

    <!-- MainHeader -->
    <header class="p-6 pt-8 sticky top-0 bg-brand-dark/90 backdrop-blur-md z-10 border-b border-white/5">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Oi, atleta! Bora para o treino de hoje? 🔥</h1>
                <p id="current-date" class="text-gray-400 text-sm mt-1"></p>
            </div>
        </div>

        <div class="flex p-1 bg-neutral-800 rounded-xl mb-6" id="workout-tabs">
            <button class="flex-1 py-2 text-sm font-bold rounded-lg transition-all bg-brand-primary text-black" data-tab="A">Treino A</button>
            <button class="flex-1 py-2 text-sm font-bold rounded-lg transition-all text-gray-400" data-tab="B">Treino B</button>
        </div>

        <!-- ProgressSection -->
        <div class="bg-brand-surface p-4 rounded-2xl shadow-lg border border-white/5">
            <div class="flex justify-between items-end mb-2">
                <span class="text-sm font-medium text-gray-300">Progresso Diário</span>
                <span id="progress-text" class="text-2xl font-black text-brand-primary">0%</span>
            </div>
            <div class="w-full bg-neutral-700 h-3 rounded-full overflow-hidden">
                <div id="progress-bar" class="progress-bar-fill bg-brand-primary h-full rounded-full" style="width: 0%;"></div>
            </div>
        </div>
    </header>

    <!-- WorkoutList -->
    <main id="exercise-list" class="px-6 mt-6 space-y-6">
        <!-- Exercícios serão renderizados aqui dinamicamente -->
    </main>

    <!-- Save Action Area -->
    <div class="px-6 mt-10 mb-6">
        <button id="btn-save-workout" onclick="saveWorkout()" class="w-full h-16 bg-brand-primary hover:bg-opacity-90 active:scale-95 text-black font-black text-xl uppercase tracking-widest rounded-2xl shadow-xl shadow-brand-primary/10 transition-all duration-200 flex items-center justify-center">
            Salvar Treino
        </button>
        <p class="text-center text-xs text-gray-500 mt-4 uppercase tracking-tighter">O progresso é salvo no celular e enviado ao clicar acima</p>
    </div>

    <!-- BottomNavigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-brand-dark border-t border-white/10 px-6 py-4 flex justify-around items-center z-20">
        <div class="text-brand-primary flex flex-col items-center">
            <svg class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            <span class="text-[10px] mt-1 font-bold">Treino</span>
        </div>
        <div onclick="alert('Funcionalidade em desenvolvimento')" class="text-gray-500 flex flex-col items-center cursor-pointer">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
            <span class="text-[10px] mt-1 font-bold">Estatísticas</span>
        </div>
        <div onclick="logout()" class="text-gray-500 flex flex-col items-center cursor-pointer">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
            <span class="text-[10px] mt-1 font-bold">Sair</span>
        </div>
    </nav>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwnj6G5k-AxCVeWng252LJJhGgVm551llXwT3JiiZil3l_KTo-1vczNdnec9xnWFeFADQ/exec';
        let workoutData = { workouts: {} };
        let currentTab = 'A';
        const userCpf = localStorage.getItem('user_cpf');

        if (!userCpf) {
            window.location.href = 'index.html';
        }

        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('current-date').innerText = new Intl.DateTimeFormat('pt-BR', options).format(new Date());

        document.addEventListener('DOMContentLoaded', fetchWorkouts);

        async function fetchWorkouts() {
            setLoading(true);
            try {
                const response = await fetch(`${API_URL}?cpf=${userCpf}`);
                const data = await response.json();
                
                if (data.error) {
                    alert(data.error);
                    logout();
                    return;
                }

                // Mesclar com o que está no LocalStorage (pendente de salvar)
                workoutData = mergeWithLocalStorage(data);
                
                // Renderizar abas primeiro
                renderTabs();
                
                // Definir primeira aba como ativa se houver dados
                const tabKeys = Object.keys(workoutData.workouts).sort();
                if (tabKeys.length > 0 && !tabKeys.includes(currentTab)) {
                    currentTab = tabKeys[0];
                }
                
                renderWorkouts();
            } catch (error) {
                console.error('Erro ao buscar treinos:', error);
                alert('Erro ao conectar com a planilha. Tente novamente.');
            } finally {
                setLoading(false);
            }
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('workout-tabs');
            const tabKeys = Object.keys(workoutData.workouts).sort();
            
            tabsContainer.innerHTML = '';
            tabKeys.forEach(key => {
                const btn = document.createElement('button');
                btn.className = `flex-1 py-2 text-sm font-bold rounded-lg transition-all ${currentTab === key ? 'bg-brand-primary text-black' : 'text-gray-400'}`;
                btn.setAttribute('data-tab', key);
                btn.innerText = `Treino ${key}`;
                btn.onclick = () => switchTab(key);
                tabsContainer.appendChild(btn);
            });
        }

        function switchTab(key) {
            currentTab = key;
            const tabButtons = document.querySelectorAll('#workout-tabs button');
            tabButtons.forEach(btn => {
                if (btn.getAttribute('data-tab') === key) {
                    btn.classList.add('bg-brand-primary', 'text-black');
                    btn.classList.remove('text-gray-400');
                } else {
                    btn.classList.remove('bg-brand-primary', 'text-black');
                    btn.classList.add('text-gray-400');
                }
            });
            renderWorkouts();
        }

        function mergeWithLocalStorage(serverData) {
            const localKey = `pending_${userCpf}`;
            const localData = JSON.parse(localStorage.getItem(localKey) || '{}');

            Object.keys(localData).forEach(exName => {
                // Procura em todas as abas dinâmicas
                Object.keys(serverData.workouts).forEach(tabKey => {
                    const ex = serverData.workouts[tabKey].find(e => e.exercicio === exName);
                    if (ex) ex.concluido = localData[exName];
                });
            });

            return serverData;
        }

        function renderWorkouts() {
            const list = document.getElementById('exercise-list');
            const data = workoutData.workouts[currentTab] || [];
            
            list.innerHTML = '';
            
            if (data.length === 0) {
                list.innerHTML = `<p class="text-center text-gray-400 py-10 uppercase tracking-widest text-xs">Nenhum exercício para Treino ${currentTab}</p>`;
            }

            data.forEach((ex, index) => {
                const card = document.createElement('article');
                card.className = "bg-brand-surface rounded-2xl overflow-hidden shadow-xl border border-white/5 transition-all active:scale-[0.98]";
                card.innerHTML = `
                    <div class="p-5 pb-0">
                        <h2 class="text-xl font-bold text-white mb-1">${ex.exercicio}</h2>
                        <p class="text-brand-accent text-sm font-semibold uppercase tracking-wider mb-4">Exercício</p>
                    </div>
                    <div class="aspect-video w-full bg-neutral-900 relative flex items-center justify-center overflow-hidden">
                        ${renderMedia(ex.gif, ex.exercicio)}
                    </div>
                    <!-- Instruções / Repetições -->
                    <div class="px-5 py-3 bg-white/5 border-b border-white/5">
                        <p class="text-sm text-gray-300 leading-relaxed font-medium capitalize">
                            ${ex.instrucoes || 'Sem instruções adicionais'}
                        </p>
                    </div>
                    <div class="p-5 pt-4">
                        <div class="relative">
                            <input class="hidden custom-checkbox" id="ex-${currentTab}-${index}" type="checkbox" ${ex.concluido ? 'checked' : ''} onchange="updateLocalStatus('${ex.exercicio}', this.checked, '${currentTab}', ${index})"/>
                            <label class="flex items-center justify-center w-full py-4 rounded-xl bg-white/5 border border-white/10 font-bold text-lg cursor-pointer transition-all active:opacity-80 select-none" for="ex-${currentTab}-${index}">
                                <svg class="w-6 h-6 mr-2 check-icon opacity-20 transform scale-75 transition-all" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                                    <path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
                                </svg>
                                <span>${ex.concluido ? 'CONCLUÍDO' : 'MARCAR CONCLUÍDO'}</span>
                            </label>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });

            updateProgress();
        }

        function renderMedia(url, alt) {
            if (!url) return `<img alt="${alt}" class="w-full h-full object-cover" src="https://via.placeholder.com/400x225?text=Sem+Mídia"/>`;
            
            const isVideo = url.toLowerCase().endsWith('.mp4') || 
                            url.toLowerCase().endsWith('.webm') || 
                            url.toLowerCase().endsWith('.mov');

            if (isVideo) {
                return `
                    <video class="w-full h-full object-cover" autoplay loop muted playsinline>
                        <source src="${url}" type="video/mp4">
                        Seu navegador não suporta vídeos.
                    </video>`;
            } else {
                return `<img alt="${alt}" class="w-full h-full object-cover" src="${url}" onerror="this.src='https://via.placeholder.com/400x225?text=Sem+Mídia'"/>`;
            }
        }

        function updateLocalStatus(exercicio, isChecked, tab, index) {
            // Atualiza dado local na memória
            if (workoutData.workouts[tab] && workoutData.workouts[tab][index]) {
                workoutData.workouts[tab][index].concluido = isChecked;
            }

            // Salva no LocalStorage
            const localKey = `pending_${userCpf}`;
            const localData = JSON.parse(localStorage.getItem(localKey) || '{}');
            localData[exercicio] = isChecked;
            localStorage.setItem(localKey, JSON.stringify(localData));

            // Atualiza UI
            const labelSpan = document.querySelector(`label[for="ex-${tab}-${index}"] span`);
            if (labelSpan) labelSpan.innerText = isChecked ? 'CONCLUÍDO' : 'MARCAR CONCLUÍDO';
            updateProgress();
        }

        async function saveWorkout() {
            setLoading(true);
            
            // Coleta todos os exercícios de todas as abas
            const allExercises = [];
            Object.keys(workoutData.workouts).forEach(tabKey => {
                allExercises.push(...workoutData.workouts[tabKey]);
            });

            const payload = {
                cpf: userCpf,
                exercicios: allExercises.map(e => ({
                    nome: e.exercicio,
                    concluido: e.concluido
                }))
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    // Limpa LocalStorage após salvar no Sheets
                    localStorage.removeItem(`pending_${userCpf}`);
                    alert('Treino enviado ao Personal Trainer');
                } else {
                    const error = await response.json();
                    alert('Erro ao salvar: ' + (error.error || 'Erro desconhecido'));
                }
            } catch (error) {
                console.error(error);
                alert('Erro de conexão ao tentar salvar o treino.');
            } finally {
                setLoading(false);
            }
        }

        function updateProgress() {
            const data = workoutData.workouts[currentTab] || [];
            const total = data.length;
            const completed = data.filter(ex => ex.concluido).length;
            const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;
            
            document.getElementById('progress-text').innerText = `${percentage}%`;
            document.getElementById('progress-bar').style.width = `${percentage}%`;
        }

        function setLoading(isLoading) {
            document.getElementById('loading-overlay').classList.toggle('hidden', !isLoading);
        }

        function logout() {
            localStorage.removeItem('user_cpf');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
