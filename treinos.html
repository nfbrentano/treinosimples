<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Meus Treinos - JustForge</title>
    <!-- Dark Mode initialization -->
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: '#CCFF00', // Neon Volt
                            dark: '#0A0A0A',
                            surface: '#171717',
                            accent: '#262626'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        body {
            transition: background-color 0.3s ease, color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .custom-checkbox:checked+label {
            background-color: #CCFF00;
            color: #000;
            border-color: #CCFF00;
        }

        .custom-checkbox:checked+label .check-icon {
            opacity: 1;
            transform: scale(1.1);
        }

        .progress-ring {
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Glassmorphism effects */
        .glass-header {
            background: rgba(243, 244, 246, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .dark .glass-header {
            background: rgba(10, 10, 10, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f3f4f6;
        }

        .dark ::-webkit-scrollbar-track {
            background: #0A0A0A;
        }
    </style>
</head>

<body class="bg-gray-100 dark:bg-brand-dark text-black dark:text-white font-sans antialiased min-h-screen pb-32 transition-colors duration-300">
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 z-50 bg-black/90 flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-brand-primary/20 border-t-brand-primary rounded-full animate-spin"></div>
        <p class="mt-4 text-brand-primary font-black uppercase tracking-widest text-xs italic">Sincronizando...</p>
    </div>

    <!-- Header / Sticky Navigation -->
    <header class="sticky top-0 z-30 glass-header">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-black italic uppercase tracking-tighter leading-none">
                    Just<span class="text-brand-primary">Forge</span>
                </h1>
                <p id="current-date" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">Sexta,
                    12 de Outubro</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-[10px] text-gray-500 font-black uppercase tracking-widest">Seu Progresso</p>
                    <p id="progress-text" class="text-lg font-black text-brand-primary">0%</p>
                </div>

                <!-- Theme Toggle -->
                <button id="theme-toggle" type="button"
                    class="h-10 w-10 rounded-full bg-brand-primary/10 border border-brand-primary/20 flex items-center justify-center hover:bg-brand-primary/20 transition-all">
                    <span id="theme-toggle-dark-icon"
                        class="material-symbols-outlined text-brand-primary hidden">dark_mode</span>
                    <span id="theme-toggle-light-icon"
                        class="material-symbols-outlined text-brand-primary hidden">light_mode</span>
                </button>
            </div>
        </div>
        <!-- Progress Bar (Mini) -->
        <div class="w-full h-1 bg-white/5 overflow-hidden">
            <div id="progress-bar" class="h-full bg-brand-primary progress-ring" style="width: 0%"></div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 pt-6 sm:pt-10">

        <!-- Tab Navigation (Centered) -->
        <div class="max-w-2xl mx-auto">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xs font-black uppercase tracking-[0.2em] text-gray-500">Categorias de Treino</h2>
            </div>
            <div id="workout-tabs"
                class="flex gap-2 p-1.5 bg-brand-accent/5 dark:bg-brand-accent rounded-2xl mb-12 overflow-x-auto no-scrollbar border border-black/5 dark:border-white/5">
                <!-- Tabs injected dynamically -->
            </div>
        </div>

        <!-- Exercise Grid (Responsive) -->
        <section id="exercise-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-8">
            <!-- Cards injected dynamically -->
        </section>

        <!-- Save Action Area (Centered) -->
        <div class="max-w-2xl mx-auto mt-16 mb-24 px-4 sm:px-0">
            <button id="btn-save-workout" onclick="saveWorkout()"
                class="group relative w-full h-20 bg-brand-primary hover:bg-opacity-90 active:scale-95 text-black font-black text-xl uppercase tracking-widest rounded-3xl shadow-2xl shadow-brand-primary/20 transition-all duration-300 flex items-center justify-center overflow-hidden">
                <span class="relative z-10 flex items-center gap-3">
                    Salvar Progresso
                    <svg class="w-6 h-6 transform group-hover:translate-x-2 transition-transform" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M13 7l5 5m0 0l-5 5m5-5H6" stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="3"></path>
                    </svg>
                </span>
            </button>
            <p
                class="text-center text-[10px] text-gray-500 mt-6 uppercase font-bold tracking-[0.15em] leading-relaxed max-w-xs mx-auto">
                Sincronize com o Personal Trainer para atualizar suas estatísticas.</p>
        </div>
    </main>

    <!-- Bottom Navigation Bar (Responsive - Unified Style) -->
    <nav
        class="fixed bottom-0 left-0 right-0 z-40 border-t border-black/5 dark:border-white/5 bg-gray-100/95 dark:bg-brand-dark/95 backdrop-blur-xl px-4 pb-8 pt-4">
        <div class="max-w-2xl mx-auto flex items-center justify-around">
            <a class="flex flex-col items-center gap-2 text-brand-primary scale-110" href="treinos.html">
                <span class="material-symbols-outlined text-3xl fill-[1]">pool</span>
                <p class="text-[10px] font-black uppercase tracking-widest">Treino</p>
            </a>
            <a class="flex flex-col items-center gap-2 text-gray-500 hover:text-brand-primary transition-all duration-300 group"
                href="estatisticas.html">
                <span
                    class="material-symbols-outlined text-3xl group-hover:scale-110 group-active:scale-95 transition-transform">bar_chart</span>
                <p class="text-[10px] font-black uppercase tracking-widest">Estatísticas</p>
            </a>
            <a class="flex flex-col items-center gap-2 text-gray-500 hover:text-brand-primary transition-all duration-300 group"
                href="#" onclick="logout()">
                <span
                    class="material-symbols-outlined text-3xl group-hover:scale-110 group-active:scale-95 transition-transform">logout</span>
                <p class="text-[10px] font-black uppercase tracking-widest">Sair</p>
            </a>
        </div>
    </nav>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwnj6G5k-AxCVeWng252LJJhGgVm551llXwT3JiiZil3l_KTo-1vczNdnec9xnWFeFADQ/exec';
        let workoutData = { workouts: {} };
        let currentTab = 'A';
        const userCpf = localStorage.getItem('user_cpf');

        if (!userCpf) {
            window.location.href = 'index.html';
        }

        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('current-date').innerText = new Intl.DateTimeFormat('pt-BR', options).format(new Date());

        document.addEventListener('DOMContentLoaded', fetchWorkouts);

        async function fetchWorkouts() {
            setLoading(true);
            try {
                const response = await fetch(`${API_URL}?cpf=${userCpf}`);
                const data = await response.json();

                if (data.error) {
                    alert(data.error);
                    logout();
                    return;
                }

                workoutData = mergeWithLocalStorage(data);
                renderTabs();

                const tabKeys = Object.keys(workoutData.workouts).sort();
                if (tabKeys.length > 0 && !tabKeys.includes(currentTab)) {
                    currentTab = tabKeys[0];
                }

                renderWorkouts();
            } catch (error) {
                console.error('Erro ao buscar treinos:', error);
                alert('Erro ao conectar com a planilha. Tente novamente.');
            } finally {
                setLoading(false);
            }
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('workout-tabs');
            const tabKeys = Object.keys(workoutData.workouts).sort();

            tabsContainer.innerHTML = '';
            tabKeys.forEach(key => {
                const btn = document.createElement('button');
                btn.className = `flex-1 min-w-[100px] py-3 text-xs font-black uppercase tracking-widest rounded-xl transition-all duration-300 ${currentTab === key ? 'bg-brand-primary text-black shadow-lg shadow-brand-primary/10' : 'text-gray-500 hover:text-brand-primary'}`;
                btn.setAttribute('data-tab', key);
                btn.innerText = `Treino ${key}`;
                btn.onclick = () => switchTab(key);
                tabsContainer.appendChild(btn);
            });
        }

        function switchTab(key) {
            currentTab = key;
            const tabButtons = document.querySelectorAll('#workout-tabs button');
            tabButtons.forEach(btn => {
                if (btn.getAttribute('data-tab') === key) {
                    btn.classList.add('bg-brand-primary', 'text-black', 'shadow-lg');
                    btn.classList.remove('text-gray-500', 'hover:text-white');
                } else {
                    btn.classList.remove('bg-brand-primary', 'text-black', 'shadow-lg');
                    btn.classList.add('text-gray-500', 'hover:text-brand-primary');
                }
            });
            renderWorkouts();
        }

        function mergeWithLocalStorage(serverData) {
            const localKey = `pending_${userCpf}`;
            const localData = JSON.parse(localStorage.getItem(localKey) || '{}');

            if (serverData.workouts) {
                Object.keys(serverData.workouts).forEach(tabKey => {
                    serverData.workouts[tabKey].forEach(ex => {
                        if (localData[ex.exercicio]) {
                            // Se for objeto (novo formato) ou boolean (legado)
                            if (typeof localData[ex.exercicio] === 'object') {
                                ex.concluido = localData[ex.exercicio].concluido;
                                ex.peso = localData[ex.exercicio].peso || ex.peso;
                            } else {
                                ex.concluido = localData[ex.exercicio];
                            }
                        }
                    });
                });
            }
            return serverData;
        }

        function renderWorkouts() {
            const list = document.getElementById('exercise-list');
            const data = workoutData.workouts[currentTab] || [];
            list.innerHTML = '';

            if (data.length === 0) {
                list.innerHTML = `<div class="col-span-full py-20 text-center"><p class="text-gray-600 font-black uppercase tracking-[0.3em] text-[10px]">Nenhum exercício carregado</p></div>`;
                return;
            }

            data.forEach((ex, index) => {
                const card = document.createElement('article');
                card.className = "group bg-white dark:bg-brand-surface rounded-[2rem] overflow-hidden shadow-2xl border border-black/5 dark:border-white/5 transition-all duration-300 hover:border-brand-primary/30 hover:translate-y-[-4px]";
                card.innerHTML = `
                    <div class="p-8 pb-6">
                        <div class="flex justify-between items-start mb-2">
                            <h2 class="text-2xl font-black italic uppercase tracking-tighter text-black dark:text-white leading-tight">${ex.exercicio}</h2>
                            <span class="text-[10px] font-black bg-brand-primary/10 text-brand-primary px-3 py-1 rounded-full uppercase tracking-widest border border-brand-primary/20">${currentTab}</span>
                        </div>
                        <div class="flex items-center justify-between mt-2">
                            <p class="text-brand-primary/60 text-[10px] font-black uppercase tracking-[0.2em]">Técnica e Execução</p>
                            <div class="flex items-center gap-2 bg-black/5 dark:bg-white/5 px-3 py-1.5 rounded-xl border border-black/10 dark:border-white/10">
                                <span class="text-[10px] font-black uppercase text-gray-500">Peso:</span>
                                <input type="text" value="${ex.peso || ''}" 
                                    onchange="updateWeight('${ex.exercicio}', this.value, '${currentTab}', ${index})"
                                    placeholder="0kg"
                                    class="w-12 bg-transparent border-none p-0 text-xs font-black text-brand-primary focus:ring-0 placeholder-gray-700 text-center">
                            </div>
                        </div>
                    </div>
                    <div class="aspect-video w-full bg-black relative flex items-center justify-center overflow-hidden border-y border-white/5">
                        ${renderMedia(ex.gif, ex.exercicio)}
                    </div>
                    <div class="px-8 py-4 bg-white/[0.02]">
                        <p class="text-xs text-gray-400 leading-relaxed font-bold italic tracking-wide">
                            ${ex.instrucoes || 'Mantenha a intensidade e o foco na execução.'}
                        </p>
                    </div>
                    <div class="p-8 pt-4">
                        <input class="hidden custom-checkbox" id="ex-${currentTab}-${index}" type="checkbox" ${ex.concluido ? 'checked' : ''} onchange="updateLocalStatus('${ex.exercicio}', this.checked, '${currentTab}', ${index})"/>
                        <label class="flex items-center justify-center w-full py-5 rounded-2xl bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 font-black text-xs uppercase tracking-widest cursor-pointer transition-all active:scale-95 select-none" for="ex-${currentTab}-${index}">
                            <svg class="w-5 h-5 mr-3 check-icon opacity-20 transform scale-75 transition-all duration-500" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                                <path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="4"></path>
                            </svg>
                            <span>${ex.concluido ? 'Finalizado' : 'Concluir'}</span>
                        </label>
                    </div>
                `;
                list.appendChild(card);
            });
            updateProgress();
        }

        function renderMedia(url, alt) {
            if (!url) return `<div class="text-gray-800 uppercase italic font-black text-[10px] tracking-widest">Sem Mídia</div>`;
            const isVideo = url.toLowerCase().match(/\.(mp4|webm|mov)$/);
            if (isVideo) {
                return `<video class="w-full h-full object-cover" autoplay loop muted playsinline><source src="${url}" type="video/mp4"></video>`;
            }
            return `<img alt="${alt}" class="w-full h-full object-cover grayscale-[0.5] group-hover:grayscale-0 transition-all duration-700" src="${url}" onerror="this.src='https://via.placeholder.com/400x225?text=Sem+Mídia'"/>`;
        }

        function updateLocalStatus(exercicio, isChecked, tab, index) {
            if (workoutData.workouts[tab] && workoutData.workouts[tab][index]) {
                workoutData.workouts[tab][index].concluido = isChecked;
            }
            saveLocalState();

            const labelSpan = document.querySelector(`label[for="ex-${tab}-${index}"] span`);
            if (labelSpan) labelSpan.innerText = isChecked ? 'Finalizado' : 'Concluir';
            updateProgress();
        }

        function updateWeight(exercicio, weight, tab, index) {
            if (workoutData.workouts[tab] && workoutData.workouts[tab][index]) {
                workoutData.workouts[tab][index].peso = weight;
            }
            saveLocalState();
        }

        function saveLocalState() {
            const localKey = `pending_${userCpf}`;
            const localData = {};
            Object.keys(workoutData.workouts).forEach(tab => {
                workoutData.workouts[tab].forEach(ex => {
                    localData[ex.exercicio] = {
                        concluido: ex.concluido,
                        peso: ex.peso
                    };
                });
            });
            localStorage.setItem(localKey, JSON.stringify(localData));
        }

        async function saveWorkout() {
            setLoading(true);
            const allExercises = [];
            Object.keys(workoutData.workouts).forEach(tabKey => allExercises.push(...workoutData.workouts[tabKey]));
            const payload = {
                cpf: userCpf,
                exercicios: allExercises.map(e => ({
                    nome: e.exercicio,
                    tipo: e.tipo,
                    concluido: e.concluido,
                    peso: e.peso
                }))
            };
            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                if (response.ok) {
                    localStorage.removeItem(`pending_${userCpf}`);
                    alert('Treino enviado com sucesso!');
                } else {
                    alert('Erro ao sincronizar. Tente novamente.');
                }
            } catch (error) {
                alert('Erro de conexão.');
            } finally {
                setLoading(false);
            }
        }

        function updateProgress() {
            const data = workoutData.workouts[currentTab] || [];
            const completed = data.filter(ex => ex.concluido).length;
            const percentage = data.length > 0 ? Math.round((completed / data.length) * 100) : 0;
            document.getElementById('progress-text').innerText = `${percentage}%`;
            document.getElementById('progress-bar').style.width = `${percentage}%`;
        }

        function setLoading(isLoading) {
            document.getElementById('loading-overlay').classList.toggle('hidden', !isLoading);
        }

        function logout() {
            localStorage.removeItem('user_cpf');
            window.location.href = 'index.html';
        }

        // Logic para Alternar Temas
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        function updateThemeIcons() {
            const isDark = document.documentElement.classList.contains('dark');
            if (isDark) {
                themeToggleLightIcon.classList.remove('hidden');
                themeToggleDarkIcon.classList.add('hidden');
            } else {
                themeToggleLightIcon.classList.add('hidden');
                themeToggleDarkIcon.classList.remove('hidden');
            }
        }

        updateThemeIcons();

        themeToggleBtn.addEventListener('click', function () {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcons();
        });
    </script>
</body>

</html>
